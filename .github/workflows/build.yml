---
name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }} with ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc

          - os: macos-latest
            compiler: clang

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Fill env
        shell: bash
        run: |
            if [ ${{ matrix.compiler }} = "clang" ]; then
              echo "CC=clang" >> "$GITHUB_ENV"
              echo "CXX=clang++" >> "$GITHUB_ENV"
            fi

      - name: Build
        shell: bash
        run: |
            mkdir build
            cd build
            cmake \
                -DCMAKE_BUILD_TYPE=Debug \
                -DPAJLADA_SIGNALS_BUILD_TESTS=On \
                ..
            cmake --build .

      - name: Test
        working-directory: ./build
        run: ctest --output-on-failure
